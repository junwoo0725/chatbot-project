apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-backend
  labels:
    app: community-backend
spec:
  replicas: 2       # horizontal scale — Redis Pub/Sub keeps WS messages in sync
  selector:
    matchLabels:
      app: community-backend
  template:
    metadata:
      labels:
        app: community-backend
    spec:
      containers:
      - name: backend
        image: junwoo0725/junwoo-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "mysql+pymysql://root:020725@db:3306/community_db"
        - name: REDIS_URL
          value: "redis://redis:6379"
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
