apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: community-db
  template:
    metadata:
      labels:
        app: community-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "020725"
        - name: MYSQL_DATABASE
          value: "community_db"
        ports:
        - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: community-db-svc
spec:
  selector:
    app: community-db
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: community-redis
  template:
    metadata:
      labels:
        app: community-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: community-redis-svc
spec:
  selector:
    app: community-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
