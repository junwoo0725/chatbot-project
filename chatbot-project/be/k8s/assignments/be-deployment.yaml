apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-be
  labels:
    app: community-be
spec:
  replicas: 2
  selector:
    matchLabels:
      app: community-be
  template:
    metadata:
      labels:
        app: community-be
    spec:
      imagePullSecrets:
      - name: ecr-regcred
      containers:
      - name: community-be
        image: 958933161468.dkr.ecr.ap-northeast-2.amazonaws.com/junwoo-backend:latest # Updated to ECR URI
        env:
        - name: DATABASE_URL
          value: "mysql+pymysql://root:020725@community-db-svc:3306/community_db"
        - name: REDIS_URL
          value: "redis://community-redis-svc:6379"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: secret-access-key
        - name: AWS_REGION
          value: "ap-northeast-2"
        - name: AWS_S3_BUCKET_NAME
          value: "junwoo-community-images-2026"
        ports:
        - containerPort: 8000
        # Wait 10s for the app to start, checks every 5s, gives up after 6 failures (30s max startup)
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 6
          periodSeconds: 5
        # Ensures the container is still running successfully
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 15
        # Ensures the container is ready to receive traffic
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: community-be-svc
spec:
  type: NodePort
  selector:
    app: community-be
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
