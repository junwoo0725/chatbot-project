services:
  db:
    image: mysql:8.0
    container_name: community_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "020725"
      MYSQL_DATABASE: community_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: community_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    image: junwoo0725/junwoo-backend:latest
    restart: always
    ports:
      - "8000-8001:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:020725@db:3306/community_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

volumes:
  db_data:
