apiVersion: v1
kind: Service
metadata:
  name: community-frontend-service
  labels:
    app: community-frontend
spec:
  # 외부에서 접근 가능하도록 LoadBalancer (클라우드 환경) 또는 NodePort (로컬/베어메탈)를 사용합니다.
  type: NodePort
  selector:
    app: community-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
